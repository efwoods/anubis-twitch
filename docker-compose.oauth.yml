services:
  oauth:
    build: .
    container_name: anubis-twitch-oauth
    command: ["node", "oauth-server.js"]
    ports:
      - "9070:9070"
    env_file:
      - .env
    environment:
      OAUTH_PORT: "9070"
      OAUTH_REDIRECT_URI: http://localhost:9070
      ENV_PATH: /app/.env
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
